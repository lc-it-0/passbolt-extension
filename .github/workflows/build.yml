name: Build and publish Passbolt CRX

on:
  schedule:
    # Run daily at 06:00 UTC to check for new releases
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Passbolt CRX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Passbolt release version
        id: passbolt_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/passbolt/passbolt_browser_extension/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest Passbolt version: $VERSION"

      - name: Check if already built
        id: check_built
        run: |
          CURRENT=""
          if [ -f dist/passbolt/version.txt ]; then
            CURRENT=$(cat dist/passbolt/version.txt)
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "${{ steps.passbolt_version.outputs.version }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already up to date: $CURRENT"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Update needed: $CURRENT -> ${{ steps.passbolt_version.outputs.version }}"
          fi

      - name: Download Passbolt MV2 Chromium build
        if: steps.check_built.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.passbolt_version.outputs.version }}"
          curl -sL "https://github.com/passbolt/passbolt_browser_extension/releases/download/v${VERSION}/passbolt-chromium-mv2-${VERSION}.zip" \
            -o passbolt-mv2.zip
          unzip -q passbolt-mv2.zip -d passbolt-mv2

      - name: Inject server URL pre-seed script
        if: steps.check_built.outputs.skip == 'false'
        env:
          PASSBOLT_SERVER_URL: ${{ secrets.PASSBOLT_SERVER_URL }}
        run: |
          # Write preseed.js — runs before index.min.js and pre-populates
          # chrome.storage.local with the trusted domain so the extension
          # connects to the self-hosted instance on first launch.
          # Only writes if not already configured (idempotent).
          cat > passbolt-mv2/build/all/preseed.js << EOF
          (async () => {
            const existing = await new Promise(r => chrome.storage.local.get("_passbolt_data", r));
            // isValid() requires trustedDomain AND all three security token fields.
            // Only seed if not already fully configured.
            if (existing._passbolt_data?.config?.["user.settings.trustedDomain"] &&
                existing._passbolt_data?.config?.["user.settings.securityToken.code"]) return;
            await new Promise(r => chrome.storage.local.set({
              _passbolt_data: {
                config: {
                  "user.settings.trustedDomain": "${PASSBOLT_SERVER_URL}",
                  "user.settings.securityToken.code": "PSB",
                  "user.settings.securityToken.color": "#1f365d",
                  "user.settings.securityToken.textColor": "#ffffff"
                }
              }
            }, r));
          })();
          EOF

          # Inject preseed.js as the first script in the background page
          sed -i 's|<script type="text/javascript" src="vendors.min.js"></script>|<script type="text/javascript" src="preseed.js"></script>\n\t<script type="text/javascript" src="vendors.min.js"></script>|' \
            passbolt-mv2/build/all/index.html

          # Verify injection
          if ! grep -q "preseed.js" passbolt-mv2/build/all/index.html; then
            echo "ERROR: preseed.js injection failed"
            exit 1
          fi
          echo "Pre-seed script injected successfully"

      - name: Install crx3 builder
        if: steps.check_built.outputs.skip == 'false'
        run: npm install -g crx3

      - name: Write private key
        if: steps.check_built.outputs.skip == 'false'
        run: echo "${{ secrets.CRX_PRIVATE_KEY_PASSBOLT }}" > passbolt-key.pem

      - name: Build CRX
        if: steps.check_built.outputs.skip == 'false'
        run: |
          mkdir -p dist/passbolt
          crx3 passbolt-mv2/build/all -p passbolt-key.pem -o dist/passbolt/passbolt-extension.crx

      - name: Get extension ID from key
        if: steps.check_built.outputs.skip == 'false'
        id: ext_id
        run: |
          # Derive extension ID from public key
          ID=$(openssl rsa -in passbolt-key.pem -pubout -outform DER 2>/dev/null | sha256sum | head -c 32 | tr '0-9a-f' 'a-p')
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "Extension ID: $ID"

      - name: Write update manifest and version file
        if: steps.check_built.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.passbolt_version.outputs.version }}"
          EXT_ID="${{ steps.ext_id.outputs.id }}"
          cat > dist/passbolt/update-manifest.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${EXT_ID}'>
              <updatecheck codebase='https://lc-it-0.github.io/passbolt-extension/passbolt/passbolt-extension.crx' version='${VERSION}'/>
            </app>
          </gupdate>
          EOF
          echo "$VERSION" > dist/passbolt/version.txt

      - name: Cleanup key
        if: always()
        run: rm -f passbolt-key.pem

      - name: Upload Pages artifact
        if: steps.check_built.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
